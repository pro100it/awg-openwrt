name: Build AmneziaWG OpenWRT Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWRT version (e.g., "23.05.3" or "snapshots")'
        required: true
        type: string
        default: 'snapshots'
      targets:
        description: 'Targets (e.g., "mediatek")'
        required: true
        type: string
        default: 'mediatek'
      subtargets:
        description: 'Subtargets (e.g., "filogic")'
        required: true
        type: string
        default: 'filogic'

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.generate-config.outputs.job-config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.16.0'

      - name: Get OpenWRT version from input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
            echo "TARGETS=${{ inputs.targets }}" >> $GITHUB_ENV
            echo "SUBTARGETS=${{ inputs.subtargets }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "workflow_call" ]; then
            VERSION="${{ inputs.tag_name }}"
            echo "VERSION=${VERSION#v}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
          fi
          echo "Using OpenWRT version: $VERSION"

      - name: Install dependencies
        run: npm install

      - name: Generate Job Config
        id: generate-config
        run: node index.js "${{ env.VERSION }}" "${{ env.TARGETS }}" "${{ env.SUBTARGETS }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: "${{ matrix.build_env.tag == 'snapshots' && 'snapshots' || format('v{0}', matrix.build_env.tag) }} - ${{ matrix.build_env.pkgarch}} :: ${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}"
    runs-on: ubuntu-latest
    needs: generate-config
    strategy:
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
      fail-fast: false

    steps:
      - name: Checkout AWG source code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pyelftools \
            build-essential \
            libncurses5-dev \
            gawk \
            git \
            gettext \
            libssl-dev \
            xsltproc \
            wget \
            curl \
            zstd \
            file \
            python3 \
            python3-pip

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk-*/
          key: sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}-

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          echo "🔧 Building for: ${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }} (${{ matrix.build_env.tag }})"
          
          # Определяем URL в зависимости от версии
          if [ "${{ matrix.build_env.tag }}" == "snapshots" ]; then
            BASE_URL="https://downloads.openwrt.org/snapshots/targets"
            SDK_PATTERN="openwrt-sdk-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}_gcc-[^\"]*_musl[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*"
          else
            BASE_URL="https://downloads.openwrt.org/releases/${{ matrix.build_env.tag }}/targets"
            SDK_PATTERN="openwrt-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}_gcc-[^\"]*_musl[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*"
          fi
          
          SDK_URL="$BASE_URL/${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}"
          echo "📦 SDK URL: $SDK_URL"
          
          # Ищем файл SDK
          SDK_FILE=$(curl -s "$SDK_URL/" | grep -oE "$SDK_PATTERN" | head -n1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "❌ SDK file not found for ${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}"
            echo "Available files:"
            curl -s "$SDK_URL/" | grep -oE 'href="[^"]*\.(tar\.zst|tar\.xz)"' || true
            exit 1
          fi
          
          echo "📥 Downloading: $SDK_FILE"
          wget "$SDK_URL/$SDK_FILE"
          
          # Распаковываем
          if [[ "$SDK_FILE" == *.tar.zst ]]; then
            tar --zstd -xf "$SDK_FILE"
          else
            tar -xf "$SDK_FILE"
          fi
          rm "$SDK_FILE"
          echo "✅ SDK extracted successfully"

      - name: Setup build environment
        run: |
          # Находим SDK директорию
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          if [ -z "$SDK_DIR" ]; then
            echo "❌ SDK directory not found"
            exit 1
          fi
          
          echo "📁 Using SDK: $SDK_DIR"
          cd "$SDK_DIR"
          
          # Обновляем feeds (как в локальном скрипте)
          echo "⚙️ Setting up feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Копируем пакеты
          echo "📋 Copying AmneziaWG packages..."
          cp -r ../kmod-amneziawg package/
          cp -r ../amneziawg-tools package/
          cp -r ../luci-proto-amneziawg package/
          
          # Конфигурация (упрощенная как в рабочем скрипте)
          echo "⚙️ Configuring build..."
          cat > .config << EOF
          CONFIG_PACKAGE_kmod-amneziawg=m
          CONFIG_PACKAGE_amneziawg-tools=y
          CONFIG_PACKAGE_luci-proto-amneziawg=y
          CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y
          EOF
          
          # Пропускаем проверки зависимостей как в рабочем скрипте
          export FORCE=1
          make defconfig
          echo "✅ Build environment setup complete"

      - name: Build packages
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          cd "$SDK_DIR"
          
          echo "🏗️ Building AmneziaWG packages..."
          
          # Сборка как в рабочем скрипте - с обработкой ошибок
          for pkg in kmod-amneziawg amneziawg-tools luci-proto-amneziawg; do
            echo "🔨 Building $pkg..."
            
            # Подготовка
            make package/$pkg/{download,prepare} V=s || echo "⚠️ Preparation warnings for $pkg"
            
            # Компиляция
            if make package/$pkg/compile -j$(nproc) V=s; then
              echo "✅ $pkg built successfully"
            else
              echo "⚠️ $pkg build completed with warnings"
            fi
            echo "---"
          done
          
          echo "📦 Build process completed"
          
          # Поиск собранных пакетов (ищем как APK так и IPK)
          echo "🔍 Searching for built packages..."
          find bin/ -name "*.apk" -o -name "*.ipk" | grep -i amnezia || echo "No Amnezia packages found"

      - name: Prepare artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          mkdir -p awgrelease
          
          # Определяем постфикс как в рабочем скрипте
          if [ "${{ matrix.build_env.tag }}" == "snapshots" ]; then
            postfix="snapshots_${{ matrix.build_env.pkgarch}}_${{ matrix.build_env.target}}_${{ matrix.build_env.subtarget}}"
            file_ext="apk"  # В snapshots используем APK
          else
            postfix="v${{ matrix.build_env.tag }}_${{ matrix.build_env.pkgarch}}_${{ matrix.build_env.target}}_${{ matrix.build_env.subtarget}}"
            file_ext="ipk"  # В релизах используем IPK
          fi
          
          echo "📦 Collecting artifacts with postfix: $postfix"
          
          # Ищем файлы с правильным расширением
          find "$SDK_DIR/bin" -name "*amneziawg-tools*.$file_ext" -exec cp {} awgrelease/amneziawg-tools_${postfix}.$file_ext \; || echo "amneziawg-tools package not found"
          find "$SDK_DIR/bin" -name "*luci-proto-amneziawg*.$file_ext" -exec cp {} awgrelease/luci-proto-amneziawg_${postfix}.$file_ext \; || echo "luci-proto-amneziawg package not found"
          find "$SDK_DIR/bin" -name "*luci-i18n-amneziawg-ru*.$file_ext" -exec cp {} awgrelease/luci-i18n-amneziawg-ru_${postfix}.$file_ext \; || echo "luci-i18n-amneziawg-ru package not found"
          find "$SDK_DIR/bin" -name "*kmod-amneziawg*.$file_ext" -exec cp {} awgrelease/kmod-amneziawg_${postfix}.$file_ext \; || echo "kmod-amneziawg package not found"
          
          # Если не нашли с основным расширением, ищем любое
          if [ ! "$(ls -A awgrelease)" ]; then
            echo "🔍 No $file_ext files found, searching for any package files..."
            find "$SDK_DIR/bin" -name "*amnezia*" -o -name "*luci-proto-amnezia*" | head -10
          fi
          
          echo "📊 Built packages:"
          ls -la awgrelease/ || echo "No packages built"

      - name: Upload Snapshot Artifact
        if: matrix.build_env.tag == 'snapshots'
        uses: actions/upload-artifact@v4
        with:
          name: awg-snapshot-${{ matrix.build_env.pkgarch}}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}
          path: awgrelease/*

      - name: Create Release
        if: matrix.build_env.tag != 'snapshots'
        uses: softprops/action-gh-release@v1
        with:
          files: awgrelease/*
          tag_name: v${{ matrix.build_env.tag }}
          draft: false
          prerelease: false
          body: |
            AmneziaWG packages for OpenWRT ${{ matrix.build_env.tag }}
            
            **Target:** ${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}
            **Architecture:** ${{ matrix.build_env.pkgarch }}
            
            Built packages:
            - kmod-amneziawg: Kernel module
            - amneziawg-tools: Userspace tools  
            - luci-proto-amneziawg: Web interface