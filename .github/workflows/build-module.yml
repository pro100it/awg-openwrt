name: Build AmneziaWG OpenWRT Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWRT version (e.g., snapshots or 23.05.3)'
        required: true
        type: string
        default: 'snapshots'
      targets:
        description: 'Targets (comma-separated, e.g., "mediatek,ramips")'
        required: true
        type: string
        default: 'mediatek'
      subtargets:
        description: 'Subtargets (comma-separated, e.g., "filogic,mt7621")'
        required: true
        type: string
        default: 'filogic'

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.generate-config.outputs.job-config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.16.0'

      - name: Get OpenWRT version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
            echo "TARGETS=${{ inputs.targets }}" >> $GITHUB_ENV
            echo "SUBTARGETS=${{ inputs.subtargets }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
            echo "TARGETS=mediatek" >> $GITHUB_ENV
            echo "SUBTARGETS=filogic" >> $GITHUB_ENV
          fi
          echo "Using OpenWRT version: $VERSION"
          echo "Targets: $TARGETS"
          echo "Subtargets: $SUBTARGETS"

      - name: Install dependencies
        run: npm install

      - name: Generate Job Config
        id: generate-config
        run: node index.js "${{ env.VERSION }}" "${{ env.TARGETS }}" "${{ env.SUBTARGETS }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: "Build ${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}"
    runs-on: ubuntu-latest
    needs: generate-config
    strategy:
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
      fail-fast: false

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pyelftools \
            build-essential \
            libncurses5-dev \
            zlib1g-dev \
            gawk \
            git \
            gettext \
            libssl-dev \
            xsltproc \
            wget \
            curl \
            zstd

      - name: Download OpenWRT SDK
        run: |
          echo "Downloading SDK for ${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}"
          
          # Determine base URL based on version
          if [ "${{ matrix.build_env.tag }}" = "snapshots" ]; then
            BASE_URL="https://downloads.openwrt.org/snapshots/targets"
          else
            BASE_URL="https://downloads.openwrt.org/releases/${{ matrix.build_env.tag }}/targets"
          fi
          
          SDK_URL="$BASE_URL/${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}"
          echo "SDK URL: $SDK_URL"
          
          # Get SDK filename
          SDK_FILE=$(curl -s "$SDK_URL/" | grep -oE 'href="(openwrt-sdk[^"]+\.tar\.(zst|xz))"' | sed 's/href="//' | sed 's/"//' | head -n1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "❌ SDK file not found at $SDK_URL/"
            echo "Available files:"
            curl -s "$SDK_URL/" | grep -oE 'href="[^"]+\.(tar\.zst|tar\.xz)"' || true
            exit 1
          fi
          
          echo "📦 Found SDK: $SDK_FILE"
          wget "$SDK_URL/$SDK_FILE"
          
          # Extract SDK
          if [[ "$SDK_FILE" == *.tar.zst ]]; then
            tar --zstd -xf "$SDK_FILE"
          else
            tar -xf "$SDK_FILE"
          fi
          
          rm -f "$SDK_FILE"
          echo "✅ SDK extracted successfully"

      - name: Setup build environment
        run: |
          # Find and setup SDK directory
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          if [ -z "$SDK_DIR" ]; then
            echo "❌ SDK directory not found"
            exit 1
          fi
          
          echo "Using SDK directory: $SDK_DIR"
          cd "$SDK_DIR"
          
          # Update and install feeds
          echo "🔄 Updating feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy our packages
          echo "📋 Copying AmneziaWG packages..."
          cp -r ../kmod-amneziawg package/
          cp -r ../amneziawg-tools package/
          cp -r ../luci-proto-amneziawg package/
          
          # Create minimal config
          echo "⚙️ Configuring build..."
          cat > .config << EOF
          
          CONFIG_PACKAGE_kmod-amneziawg=m
          CONFIG_PACKAGE_amneziawg-tools=y
          CONFIG_PACKAGE_luci-proto-amneziawg=y
          CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y
          EOF
          
          make defconfig
          echo "✅ Build environment setup complete"

      - name: Build packages
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          cd "$SDK_DIR"
          
          echo "🏗️ Starting package builds..."
          
          # Build packages with better error handling
          for pkg in kmod-amneziawg amneziawg-tools luci-proto-amneziawg; do
            echo "🔨 Building $pkg..."
            
            # Download and prepare
            if ! make package/$pkg/{download,prepare} V=s; then
              echo "⚠️ Preparation failed for $pkg, continuing..."
            fi
            
            # Compile
            if ! make package/$pkg/compile V=s; then
              echo "❌ Build failed for $pkg"
              # Don't exit immediately, try to build other packages
            else
              echo "✅ $pkg built successfully"
            fi
            echo "---"
          done
          
          echo "📦 Build process completed"
          
          # List all built packages
          echo "🔍 Built packages:"
          find bin/ -name "*.ipk" | grep -i amnezia || echo "No Amnezia packages found"

      - name: Collect artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          
          # Create release directory
          mkdir -p awgrelease
          
          echo "📁 Searching for built packages..."
          
          # Find and copy all amnezia-related packages
          find "$SDK_DIR/bin" -name "*amnezia*.ipk" -o -name "*luci-proto-amnezia*.ipk" | while read pkg; do
            if [ -f "$pkg" ]; then
              filename=$(basename "$pkg")
              # Remove version from filename for cleaner naming
              newname=$(echo "$filename" | sed 's/_\([^_]*\)\{2,\}\.ipk$/.ipk/')
              cp "$pkg" "awgrelease/$newname"
              echo "📦 Copied: $filename → $newname"
            fi
          done
          
          # If no packages found, create debug info
          if [ -z "$(ls -A awgrelease)" ]; then
            echo "❌ No packages were built!"
            echo "Debug information:" > awgrelease/DEBUG_INFO.txt
            echo "Target: ${{ matrix.build_env.target }}" >> awgrelease/DEBUG_INFO.txt
            echo "Subtarget: ${{ matrix.build_env.subtarget }}" >> awgrelease/DEBUG_INFO.txt
            echo "Version: ${{ matrix.build_env.tag }}" >> awgrelease/DEBUG_INFO.txt
            echo "Architecture: ${{ matrix.build_env.pkgarch }}" >> awgrelease/DEBUG_INFO.txt
            find "$SDK_DIR/bin" -name "*.ipk" | head -10 >> awgrelease/DEBUG_INFO.txt
          fi
          
          echo "📊 Final artifacts:"
          ls -la awgrelease/

      - name: Create release
        if: success() || failure()
        uses: softprops/action-gh-release@v1
        with:
          files: awgrelease/*
          tag_name: ${{ github.ref_name || 'snapshots' }}
          draft: false
          prerelease: ${{ matrix.build_env.tag == 'snapshots' }}
          body: |
            AmneziaWG packages for OpenWRT ${{ matrix.build_env.tag }}
            
            **Target:** ${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}
            **Architecture:** ${{ matrix.build_env.pkgarch }}
            
            Built packages:
            - kmod-amneziawg: Kernel module
            - amneziawg-tools: Userspace tools
            - luci-proto-amneziawg: Web interface
            
            ### Installation
            ```bash
            opkg install <package-name>.ipk
            ```